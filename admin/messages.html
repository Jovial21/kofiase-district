<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | SDA Church Kofiase District</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-body" data-admin-page="messages">
  <div class="admin-shell" data-admin-shell>
    <aside class="admin-sidebar">
      <a class="brand admin-sidebar__brand" href="dashboard.html"><img src="../assets/images/logo-mark.png" alt="" class="brand__mark"><span class="brand__text">SDA Church<br>Kofiase District</span></a>
      <nav class="admin-nav" aria-label="Admin navigation"><a href="dashboard.html" data-admin-nav="dashboard">Overview</a><a href="sermons.html" data-admin-nav="sermons">Sermons</a><a href="events.html" data-admin-nav="events">Events</a><a href="announcements.html" data-admin-nav="announcements">Announcements</a><a href="ministries.html" data-admin-nav="ministries">Ministries</a><a href="gallery.html" data-admin-nav="gallery">Gallery</a><a href="messages.html" data-admin-nav="messages">Messages</a><a href="settings.html" data-admin-nav="settings">Settings</a></nav>
      <a class="admin-sidebar__site" href="../index.html">View Public Site</a>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <button class="admin-menu-button" type="button" aria-label="Open admin menu" aria-expanded="false" data-admin-toggle><span></span><span></span><span></span></button>
        <div><p class="admin-topbar__eyebrow">Inbox</p><h1>Messages</h1></div>
        <label class="admin-search"><span>Search</span><input type="search" placeholder="Search messages"></label>
        <a class="btn btn--primary" href="../contact.html">Contact Page</a>
      </header>

      <main class="admin-content">
        <section class="admin-grid admin-grid--messages">
          <article class="admin-panel">
            <div class="admin-panel__header"><div><p class="kicker">Inbox</p><h2>Recent Messages</h2></div><span class="status-pill status-pill--new" data-unread-count>—</span></div>
            <div class="admin-message-list" data-admin-messages>
              <!-- Messages will be populated dynamically -->
            </div>
          </article>

          <article class="admin-panel">
            <div class="admin-panel__header"><div><p class="kicker">Selected</p><h2>Prayer Request</h2></div><span class="status-pill status-pill--new">Unread</span></div>
            <div class="admin-message-detail" data-admin-message-detail>
              <!-- Selected message details will be populated dynamically -->
            </div>
            <form class="admin-reply-form" data-feedback-form data-supabase-form="message-reply">
              <label for="reply-message">Reply</label>
              <textarea id="reply-message" rows="6" placeholder="Write a pastoral response"></textarea>
              <div class="admin-form-actions">
                <button class="btn btn--primary" type="submit">Send Reply</button>
                <button class="btn btn--dark" type="button">Mark Resolved</button>
              </div>
              <p class="form-status" data-form-status role="status"></p>
            </form>
          </article>
        </section>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../js/supabase-config.js"></script>
  <script type="module" src="../js/supabase-service.js"></script>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
