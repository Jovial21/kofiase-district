<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Announcements | SDA Church Kofiase District</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-body" data-admin-page="announcements">
  <div class="admin-shell" data-admin-shell>
    <aside class="admin-sidebar">
      <a class="brand admin-sidebar__brand" href="dashboard.html"><img src="../assets/images/logo-mark.png" alt="" class="brand__mark"><span class="brand__text">SDA Church<br>Kofiase District</span></a>
      <nav class="admin-nav" aria-label="Admin navigation"><a href="dashboard.html" data-admin-nav="dashboard">Overview</a><a href="sermons.html" data-admin-nav="sermons">Sermons</a><a href="events.html" data-admin-nav="events">Events</a><a href="announcements.html" data-admin-nav="announcements">Announcements</a><a href="ministries.html" data-admin-nav="ministries">Ministries</a><a href="gallery.html" data-admin-nav="gallery">Gallery</a><a href="messages.html" data-admin-nav="messages">Messages</a><a href="settings.html" data-admin-nav="settings">Settings</a></nav>
      <a class="admin-sidebar__site" href="../index.html">View Public Site</a>
    </aside>

    <div class="admin-main">
      <header class="admin-topbar">
        <button class="admin-menu-button" type="button" aria-label="Open admin menu" aria-expanded="false" data-admin-toggle><span></span><span></span><span></span></button>
        <div><p class="admin-topbar__eyebrow">Updates</p><h1>Announcements</h1></div>
        <label class="admin-search"><span>Search</span><input type="search" placeholder="Search announcements"></label>
        <a class="btn btn--primary" href="#announcement-form">New Announcement</a>
      </header>

      <main class="admin-content">
        <section class="admin-grid admin-grid--forms">
          <article class="admin-panel">
            <div class="admin-panel__header"><div><p class="kicker">Notice Board</p><h2>Published &amp; Draft Updates</h2></div><a href="../announcements.html">Preview page</a></div>
            <div class="admin-table-wrap">
              <table class="admin-table">
                <thead><tr><th>Title</th><th>Ministry</th><th>Date</th><th>Priority</th><th>Status</th></tr></thead>
                <tbody data-admin-announcements>
                  <!-- Announcements will be populated dynamically -->
                </tbody>
              </table>
            </div>
          </article>

          <form class="admin-panel admin-form" id="announcement-form" data-feedback-form data-supabase-form="announcement">
            <p class="kicker">Editor</p>
            <h2>Add Announcement</h2>
            <label for="announcement-title">Title</label>
            <input id="announcement-title" name="title" type="text" placeholder="Youth Camp registration is open" required>
            <label for="announcement-ministry">Ministry</label>
            <select id="announcement-ministry" name="ministry"><option>District</option><option>Youth Ministry</option><option>Women's Ministry</option><option>Children's Ministry</option><option>Health Ministry</option><option>Personal Ministries</option></select>
            <label for="announcement-date">Announcement Date</label>
            <input id="announcement-date" name="announcement_date" type="date" required>
            <label for="announcement-summary">Short Summary</label>
            <textarea id="announcement-summary" name="summary" rows="3" placeholder="Brief notice for the homepage cards"></textarea>
            <label for="announcement-body">Full Details</label>
            <textarea id="announcement-body" name="body" rows="6" placeholder="Full announcement details, instructions, venue, amount, deadline, or contacts"></textarea>
            <label for="announcement-link-url">Optional Link</label>
            <input id="announcement-link-url" name="link_url" type="text" placeholder="events.html or contact.html">
            <label for="announcement-link-label">Link Label</label>
            <input id="announcement-link-label" name="link_label" type="text" placeholder="View details">
            <label for="announcement-priority">Priority</label>
            <select id="announcement-priority" name="priority"><option value="normal">Normal</option><option value="featured">Featured</option><option value="urgent">Urgent</option></select>
            <label for="announcement-expires">Expires On</label>
            <input id="announcement-expires" name="expires_on" type="date">
            <label for="announcement-status">Status</label>
            <select id="announcement-status" name="status"><option value="published">Published</option><option value="draft">Draft</option><option value="archived">Archived</option></select>
            <button class="btn btn--primary" type="submit">Save Announcement</button>
            <p class="form-status" data-form-status role="status"></p>
          </form>
        </section>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../js/supabase-config.js"></script>
  <script type="module" src="../js/supabase-service.js"></script>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
