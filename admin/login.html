<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | SDA Church Kofiase District</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="admin-login" data-admin-page="login">
  <main class="admin-auth">
    <section class="admin-auth__panel">
      <a class="brand admin-auth__brand" href="../index.html" aria-label="SDA Church Kofiase District home">
        <img src="../assets/images/logo-mark.png" alt="" class="brand__mark">
        <span class="brand__text">SDA Church<br>Kofiase District</span>
      </a>

      <form class="admin-auth__form" action="dashboard.html" method="get" data-admin-login>
        <p class="kicker">Admin Portal</p>
        <h1>Sign In</h1>
        <p>Manage sermons, events, giving records, enquiries, and church information.</p>

        <label for="admin-email">Email Address</label>
        <input id="admin-email" name="email" type="email" placeholder="admin@kofiaseadventist.org" required>

        <label for="admin-password">Password</label>
        <div class="password-field">
          <input id="admin-password" name="password" type="password" placeholder="Enter password" required>
          <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false" data-password-toggle="admin-password">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/></svg>
          </button>
        </div>

        <div class="admin-auth__options">
          <label class="check-row">
            <input type="checkbox" name="remember">
            <span>Remember this device</span>
          </label>
          <a href="settings.html">Need help?</a>
        </div>

        <button class="btn btn--primary" type="submit">Sign In</button>
        <p class="form-status" data-form-status role="status"></p>
      </form>

      <a class="admin-auth__back" href="../index.html">Back to public site</a>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="../js/supabase-config.js"></script>
  <script type="module" src="../js/supabase-service.js"></script>
  <script type="module" src="../js/app.js"></script>
</body>
</html>
