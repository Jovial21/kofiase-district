<!-- Inline nav initializer: ensures mobile toggle works even if site JS isn't loaded -->
<script>
  (function(){
    try {
      const header = document.querySelector('.site-header');
      const navToggle = header && header.querySelector('[data-nav-toggle]');
      const siteNav = document.querySelector('[data-site-nav]') || document.querySelector('.site-nav');
      if (!header || !navToggle || !siteNav) return;

      navToggle.addEventListener('click', () => {
        console.debug('navToggle (inline) clicked');
        const isOpen = header.classList.toggle('is-open');
        document.body.classList.toggle('nav-open', isOpen);
        navToggle.setAttribute('aria-expanded', String(isOpen));
        navToggle.setAttribute('aria-label', isOpen ? 'Close navigation' : 'Open navigation');
        console.debug('site-header state (inline):', isOpen);
      });

      siteNav.addEventListener('click', (event) => {
        if (event.target.closest('a')) {
          header.classList.remove('is-open');
          document.body.classList.remove('nav-open');
          navToggle.setAttribute('aria-expanded', 'false');
          navToggle.setAttribute('aria-label', 'Open navigation');
        }
      });
    } catch (e) { /* ignore */ }
  })();
</script>
